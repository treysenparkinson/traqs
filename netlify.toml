[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[dev]
  command = "vite"
  port = 8888
  targetPort = 5173
  autoLaunch = false

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# ── Scheduled functions ──────────────────────────────────────────────────────
# Daily backup of every org's S3 data to backups/{YYYY-MM-DD}/. Combined with
# bucket versioning, gives point-in-time recovery for the last 30 days even
# against bugs that pass the live overwrite guards. 5am UTC = midnight EST
# (off-hours for US users).
[functions."backup-daily"]
  schedule = "0 5 * * *"

# Daily sweep for forgotten clock-outs: flags pay shifts open > 12h and pushes
# a reminder to the worker + an alert to admins (once per shift). 5am UTC.
[functions."forgot-clockout"]
  schedule = "0 5 * * *"

# Daily cleanup: prune CANCELLED time-off requests older than 30 days from every
# org's timeoff.json (they're otherwise kept forever). 5am UTC.
[functions."timeoff-cleanup"]
  schedule = "0 5 * * *"

# ── Security headers ─────────────────────────────────────────────────────────
# Applied to every response Netlify serves from the SPA build. Keep them
# permissive enough not to break the existing toolchain (DM Sans from Google
# Fonts, Auth0 / Anthropic / OneSignal / S3 API calls, blob: URLs for the
# Excel exporter).
[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=(), payment=()"
    # CSP allows: self-hosted scripts, inline styles (React style props),
    # Google Fonts CSS, fonts.gstatic.com fonts, blob:/data: for image
    # previews and Excel downloads, Auth0/Anthropic/OneSignal API calls
    # over HTTPS. 'unsafe-inline' is required for the inline style attrs
    # the app uses heavily; we tighten further when the inline styles are
    # extracted to a stylesheet.
    # script-src needs 'unsafe-inline' for Vite's dev-mode React-Refresh
    # bootstrap (an inline <script type="module">). Production builds emit
    # only external script files, so this stays sound. If we ever inject
    # untrusted HTML we should switch to a nonce-based policy.
    # frame-src must allow the Auth0 domain: when the refresh-token grant
    # fails, @auth0/auth0-react falls back to silent auth in a hidden iframe
    # pointed at the tenant. Without this, frame-src falls back to
    # default-src 'self', the iframe is blocked, and login hangs forever on
    # the loading spinner.
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https:; connect-src 'self' https://*.auth0.com https://api.anthropic.com https://onesignal.com https://*.s3.amazonaws.com https://*.amazonaws.com https://*.ably.io wss://*.ably.io https://*.ably-realtime.com wss://*.ably-realtime.com https://*.realtime.ably.net wss://*.realtime.ably.net ws://localhost:* http://localhost:*; frame-src 'self' https://*.auth0.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"
